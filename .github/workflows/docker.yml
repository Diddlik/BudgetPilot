name: Build and push Docker image

# Builds the BudgetPilot container on every push to main and publishes it to the
# GitHub Container Registry (GHCR). The production server pulls this prebuilt
# image (via Watchtower) — it no longer compiles anything itself.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # github.repository is "Diddlik/BudgetPilot"; metadata-action lowercases it,
  # so the published image is ghcr.io/diddlik/budgetpilot.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Volle Historie, damit die Commit-Anzahl (Patch-Version) stimmt.
          fetch-depth: 0

      - name: Commit metadata
        id: commit
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"
          # Version = VersionPrefix (MAJOR.MINOR aus der .csproj) + Commit-Anzahl als Patch.
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' src/BudgetPilot.Web/BudgetPilot.Web.csproj | head -1)
          PREFIX=${PREFIX:-1.0}
          HEIGHT=$(git rev-list --count HEAD)
          echo "version=${PREFIX}.${HEIGHT}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_HASH=${{ steps.commit.outputs.hash }}
            COMMIT_DATE=${{ steps.commit.outputs.date }}
            APP_VERSION=${{ steps.commit.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
