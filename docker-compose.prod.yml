# Production stack: BudgetPilot behind Caddy (TLS via Let's Encrypt).
# Usage:
#   1. Copy .env.example to .env and fill in DOMAIN, BP_AUTH_EMAIL, BP_AUTH_PASSWORD.
#   2. Point your domain's DNS A/AAAA record at this server; open ports 80 + 443.
#   3. docker compose -f docker-compose.prod.yml up -d --build
services:
  budgetpilot:
    build: .
    image: budgetpilot:latest
    container_name: budgetpilot
    expose:
      - "8080"            # internal only — not published to the host
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=Sqlite
      - Database__ConnectionString=Data Source=/app/data/budgetpilot.db
      - Auth__Email=${BP_AUTH_EMAIL:?set BP_AUTH_EMAIL in .env}
      - Auth__Password=${BP_AUTH_PASSWORD:?set BP_AUTH_PASSWORD in .env}
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: budgetpilot-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - budgetpilot
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
